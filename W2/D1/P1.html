<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning elements: static</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 15px;
            padding: 0;
            background-color: #e31010;
        }
        .box {
            position: static;
            width: 150px;
            height: 100px;
            background-color: lightblue;
            border: 1px solid black;
            border-radius: 10px;
            box-shadow: 5px 4px 10px black;
            margin: 20px;
            text-align: center;
            color: rgb(246, 152, 11);
        }
    </style>
</head>
<body>
    <h2>Static Position</h2>
    <div class="box">Static Box</div>

</body>
</html>
