<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position: Relative House</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 15px;
            padding: 0;
            background-color:lightblue;
        }
        .box {
            position: relative;
            left: 300px;
            width: 650px;
            height: 50px;
            background-color: rgb(251, 140, 6);
            color: rgb(246, 152, 11);
            border: 5px solid black;
        }
         .box1 {
            position: relative;
            left: 28%;
            width: 400px;
            height: 390px;
            background-color: rgb(152, 222, 21);
            border: 4px solid black;
            text-align: center;
            color: rgb(246, 152, 11);
            border: 5px solid black;
            border-top: 0px solid black;

         }
            .box2 {
                position: relative;
                top: 50px;
                left: 50px;
                width: 60px;
                height: 110px;
                background-color: yellow;
                border: 5px solid black;

            }
            .boxn {
                position: relative;
                top: 20px;
                left: 5px;
                width: 10px;
                height: 30px;
                background-color: black;
                border: 5px solid black;

            }
            .boxu {
                position: absolute;
                top: 20px;
                right: 5px;
                width: 10px;
                height: 30px;
                background-color: black;
                border: 5px solid black;

            }
            .boxz{
                position: relative;
                bottom: -30px;
                left: 10px;
                
                width: 30px;
                height: 10px;
                background-color: rgb(12, 12, 10);
                border: 5px dotted rgb(250, 245, 245);
            }
            .box3 {
                position: absolute;
                top: 90px;
                right: 40px;
                width: 60px;
                height: 70px;
                background-color: purple;
                border: 5px solid black;
 

            }
            .box4 {
                position: absolute;
                bottom: 0%;
                left: 145px;
                width: 115px;
                height: 195px;
                background-color: blue;
                border: 5px  solid black;
                border-bottom: 0px solid black;

            }

    </style>
</head>


<body>
    <h1>House</h1>
    <div class="box"></div>
    <div class="box1">
        <div class="box2">
            <div class="boxn"></div>
            <div class="boxu"></div>
            <div class="boxz"></div>
        </div>
        <div class="box3"></div>
        <div class="box4"></div>
    </div>
</body>
</html>
