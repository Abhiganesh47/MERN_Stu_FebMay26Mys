<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>assignment: transition & animation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            background-color: bisque;

        }
        /* nav bar using sticky function */
        .navbar {
            position: sticky;
            top: 0;
            height: 40px;
            background-color:brown;
            z-index: 1000;
        }
        .navbar a {
            color: black;
            text-decoration: none;
            padding: 20px;
            transition: 0.3s ;
        }
        .navbar a:hover {
            color:pink;
            transform: scale(1.1);
            font-size: 30px;
            
        }
        /* button hover */
        .hover-button {
            background-color: goldenrod;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            transition: 0.3s ;
        }
        .hover-button:hover {
            background-color: silver;
            transform: scale(1.1);
        }
        /* bouncing ball */
        .ball {
            width: 50px;
            height: 50px;
            background-color:goldenrod;
            border-radius: 50%;
            position: relative;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% {
                top: 0;
            }
            50% {
                top: 200px ;
                background-color: silver;
            }
        }

        /* z-index */
     
        .box1,.box2 {
            position: absolute;
            width: 100px;
            height: 100px;
            padding: 20px;
            color: white;
        }
        .box1 {
            background-color:  red;
            top: 500px;
            left: 50px;
            z-index: 1;
            opacity: 60%;
            border:black solid 5px;
        }
        .box2 {
            background-color: blue;
            top: 550px;
            left: 80px;
            z-index: 0;
            border: black solid 5px;
        }

            /* House */
        .Big-box {
            top: 500px;
            bottom: 500px;
            position: relative;
            width: 1000px;
            height: 700px;
            background-color: white;
            border: 4px solid black;
            text-align: center;
            color: rgb(246, 152, 11);
            border: 5px solid black;
        }
         .roof{
            position: relative;
            top: 100px;
            left: 175px;
            width: 650px;
            height: 50px;
            background-color: rgb(251, 140, 6);
            color: rgb(246, 152, 11);
            border: 5px solid black;
        }
         .house  {
            position: relative;
            top: 100px;
            left: 305px;
            width: 400px;
            height: 390px;
            background-color: rgb(152, 222, 21);
            color: rgb(246, 152, 11);
            border: 5px solid black;
            border-top: 0px solid black;

         }
            .w1 {
                position: relative;
                top: 50px;
                left: 50px;
                width: 60px;
                height: 110px;
                background-color: yellow;
                border: 5px solid black;

            }
            .boxn {
                position: relative;
                top: 20px;
                left: 5px;
                width: 10px;
                height: 30px;
                background-color: black;
                border: 5px solid black;

            }
            .boxu {
                position: absolute;
                top: 20px;
                right: 5px;
                width: 10px;
                height: 30px;
                background-color: black;
                border: 5px solid black;

            }
            .boxz{
                position: relative;
                bottom: -30px;
                left: 10px;
                
                width: 30px;
                height: 10px;
                background-color: rgb(12, 12, 10);
                border: 5px dotted rgb(250, 245, 245);
            }
            .w2 {
                position: relative;
                top: -30px;
                right: -285px;
                width: 60px;
                height: 70px;
                background-color: purple;
                border: 5px solid black;
 

            }
            .door {
                position: relative;
                bottom: 2%;
                left: 145px;
                width: 115px;
                height: 195px;
                background-color: blue;
                border: 5px  solid black;
                border-bottom: 0px solid black;

            }

                  /* footer */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 10px;
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
        }

        

    </style>
</head>
<body>
    <!-- sticky navbar -->
    <div class="navbar">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
    </div>

        <h2>Button Hover</h2>
        <button class="hover-button">Hover Me</button>


        <h2>Bouncing ball</h2>
        <div class="ball"></div>

        <div class="box1"></div>
        <div class="box2"></div>


        <!-- house -->
     <div class="Big-box">
        <div class="roof"></div>
        <div class="house">
            <div class="w1">
                <div class="boxn"></div>
                <div class="boxu"></div>
                <div class="boxz"></div>
            </div>
            <div class="w2"></div>
            <div class="door"></div>
        </div>
    </div>
    <!-- Footer -->
     <div class="footer">
        fixed footer
     </div>
     
</body>
</html>
