<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS Example</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<!-- 50,100,....900 -->
<body class="bg-yellow-200">
    <p class="text-red-500">Hello Tailwind CSS!</p>
    <h2 class="text-blue-800 p-4 m-2">Utility Class</h2>
    <h3 class="text-blue-800 pr-4 mt-2">Utility Class 1</h3>
    <h4 class="text-yellow-800 px-6 py-6 mt-4 bg-yellow-300">Utility Class 2</h4>
    <div class="border-5 bg-red-100 border-red-300 rounded-b-lg"> Name</div>    
    <p class="text-lg">My text 1</p> <!-- sm/base/lg/xl/2xl/3xl-->
    <p class="text-light">My text 2</p> <!-- light/normal/bold-->
    <p class="text-center">My text 3</p> <!-- left/right/center/justify -->

    <button class="hover:text-red-600 hover:bg-green-700">hover me</button>
<!-- success: green,error:red, warning/alert:yellow , Info:blue -->
    <div class="bg-yellow-300 p-4">
         <p class="font-bold">this is a alert message</p>
    </div>
    <span class="inline-flex items-center bg-blue-100 text-blue-800 px-3 py-1 rounded-full">
     by by
    </span>

    <!-- card -->
    <div class="border p-6 rounded m-6">
        <h3 class="font-bold text-xl">Card title</h3>
        <p>this is a simple discription inside a card</p>

    </div>
    </body>
</html>
