<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript: Variables: hoisting</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <pre id="out">
    </pre>
    <button id="runBtn" class="px-3 py-1 rounded mt-2 mb-2 bg-gray-400 hover:bg-gray-900">
        Run
    </button>
    <script>
        const out = document.getElementById("out");
        function print(...args) {
            // Console
            console.log(...args);
            out.textContent += args.join("") + "\n";
        }
        function clearOut() {
            out.textContent = "";
        }
        function run() {
            clearOut();
            if (true) {
                var x = "var escapes the if-block";
            }
            print("X = ", x);
            // let:scope
            if (true) {
                let y = "let stays in the if-block";
                print("y inside block = ", y);
            }
            // print("y outside block = ",y);

            print("before declaration ", testVar);
            var testVar = "assigned value now";
            print("After declasrtion ", testVar);

            try {
                print("before let declaration ", testLet);
            }
            catch (e) {
                print("Accessing let before decn causes", e.name, e.message);
            }
            let testLet = "declared now";
            print("after let declaration ", testLet);
        }
        document.getElementById("runBtn").addEventListener("click", run);
    </script>
</body>

</html>
