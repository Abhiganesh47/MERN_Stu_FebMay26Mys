<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript: Objects, arrays</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <pre id="out">
    </pre>
    <button id="runBtn" class="px-3 py-1 rounded mt-2 mb-2 bg-gray-400 hover:bg-gray-900">
        Run
    </button>
    <script>
        const out = document.getElementById("out");
        function print(...args) {
            // Console
            console.log(...args);
            out.textContent += args.join("") + "\n";
        }
        function clearOut() {
            out.textContent = "";
        }
        function run() {
            clearOut();
            
            const user = {name:"Abhi",age:21};
            print("User = ",JSON.stringify(user));

            const myArray = [1,2,3];
            myArray.push(5);
            print("Is it an array:? ",Array.isArray(myArray)); 
        }
        document.getElementById("runBtn").addEventListener("click", run);
    </script>
</body>

</html>
