<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javascript: concole usage and simple DOM manipulation</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <h1 class="text-2xl font-bold">My first JavaScript</h1>
    <button id="runBtn" class="px-3 py-1 rounded mt-2 mb-2 bg-gray-400 hover:bg-gray-900">
        Run
    </button>
    <pre id="out">

    </pre>
    <script>
        const out = document.getElementById("out");
        // Function which accepts variables no. of args
        function print(...args) {
            // Console
            console.log(...args);
            out.textContent += args.join("") + "\n";
        }
        function run() {
            print("Hello from java script!");
            print("The sum of 2 and 3 is ", 2 + 3);
            document.body.style.background = "#F7D10F";
        }
        document.getElementById("runBtn").addEventListener("click", run);
        run();
    </script>
</body>

</html>
